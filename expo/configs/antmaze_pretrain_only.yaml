# Shared 500k IL pretrain for Antmaze. Saves a checkpoint that BOTH the
# vanilla and improved online configs will resume from. This way both runs
# start from an identical pretrained base policy + identical (random-init)
# critic + edit policy + alpha. Fair comparison.
#
# Runs alone on GPU (~32 min on RTX 5060 Ti). Parallel online phases
# follow afterward.

seed: 42
device: auto
log_dir: runs/antmaze_pretrain
run_name: shared

env:
  name: antmaze
  dataset_id: D4RL/antmaze/medium-diverse-v1

online_capacity: 1000000
min_online_for_update: 256
online_ratio: 0.5
max_episode_steps: 1000

pretrain_steps: 500000          # paper-exact for Antmaze
total_env_steps: 0              # pretrain-only mode
batch_size: 256
utd: 5                          # irrelevant (no online)
log_every: 1000
eval_every: 999999999           # disable eval during pretrain
eval_episodes: 1
eval_at_pretrain_end: true
save_pretrain_checkpoint: runs/antmaze_pretrain/shared.ckpt

agent:
  hidden_dim: 256
  diffusion_blocks: 3
  diffusion_steps: 10
  edit_layers: 3
  edit_dropout: 0.0
  beta: 0.05                    # initial; vanilla keeps it, improved overrides
  ensemble_size: 10
  num_min_q: 2
  n_otf_samples: 8
  gamma: 0.99
  tau: 0.005
  lr: 0.0003
  edit_grad_clip: 1.0
  delayed_edit_steps: 5000
