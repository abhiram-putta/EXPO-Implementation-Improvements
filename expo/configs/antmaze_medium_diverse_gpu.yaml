# GPU-tuned paper-scale Antmaze config for RTX 5060 Ti (~7-8 h overnight).
#
# Calibrated throughput on the 5060 Ti:
#   pretrain:           ~264 steps/s   (500k = 32 min)
#   online @ UTD=20:   ~2.0 env-steps/s  (500k = 70 h)  <-- too long
#   online @ UTD=10:  ~4.0 env-steps/s  (100k = ~7 h)  <-- target
#
# Differences vs. paper-exact (antmaze_medium_diverse_paper.yaml):
#   - utd:           20 -> 10  (compute compromise; SAC default is 1, so 10
#                              is still 10× more updates per env step than
#                              standard. EXPO's sample-efficiency claim still
#                              tested.)
#   - total_env_steps: 500k -> 100k  (paper's curves stabilize by ~250k for
#                                    medium-diverse; 100k should show the
#                                    bulk of the learning curve)
#   - eval_episodes: 100 -> 30  (variance still small enough to compare)
# Everything else is paper-exact.

seed: 42
device: auto              # cuda is detected
log_dir: runs/antmaze_gpu
run_name: null

env:
  name: antmaze
  dataset_id: D4RL/antmaze/medium-diverse-v1

online_capacity: 1000000
min_online_for_update: 256
online_ratio: 0.5
max_episode_steps: 1000

pretrain_steps: 500000      # paper-exact
total_env_steps: 100000     # 1/5 of paper - compute compromise
batch_size: 256             # paper-exact
utd: 10                     # paper used 20; halved for 5060 Ti
log_every: 1000
eval_every: 5000            # paper-exact
eval_episodes: 30           # paper used 100
eval_at_pretrain_end: true
save_every_steps: 10000     # checkpoint every 10k env steps (~40 min on
                            # this GPU). Resume with --resume <path>.ckpt

agent:
  hidden_dim: 256           # paper-exact
  diffusion_blocks: 3       # paper-exact
  diffusion_steps: 10       # paper-exact
  edit_layers: 3            # paper-exact
  edit_dropout: 0.0
  beta: 0.05                # paper used 0.0 for offline-to-online Antmaze
                            # (no edits — base alone is enough at 500k pretrain).
                            # 0.05 here exercises the full EXPO mechanism.
                            # See DECISIONS.md notes.
  ensemble_size: 10         # paper-exact
  num_min_q: 2              # paper-exact
  n_otf_samples: 8          # paper-exact
  gamma: 0.99               # paper-exact
  tau: 0.005                # paper-exact
  lr: 0.0003                # paper-exact
  edit_grad_clip: 1.0
  delayed_edit_steps: 5000  # paper-exact
