# EXPO + improvements (n-step returns from S&B Ch. 7 + progressive β
# scheduler analogous to S&B Ch. 2 ε-decay). Resumes from same shared
# pretrain checkpoint as the vanilla baseline so the comparison is fair.
#
# Differences vs antmaze_vanilla.yaml are EXACTLY:
#   - n_step: 3 (vs 1)
#   - progressive_beta block (vs fixed β=0.05)
# Everything else identical.

seed: 42
device: auto
log_dir: runs/antmaze_improved
run_name: full

env:
  name: antmaze
  dataset_id: D4RL/antmaze/medium-diverse-v1

online_capacity: 1000000
min_online_for_update: 256
online_ratio: 0.5
max_episode_steps: 1000

pretrain_steps: 0
total_env_steps: 80000
batch_size: 256
utd: 5
log_every: 1000
eval_every: 10000
eval_episodes: 15
eval_at_pretrain_end: false
save_every_steps: 10000

# === IMPROVEMENTS ===
# (1) N-step returns (S&B Ch. 7): faster credit assignment in sparse-reward
#     Antmaze. n=3 is a textbook conservative choice.
n_step: 3

# (2) Progressive β (S&B Ch. 2 ε-decay analogue): explore broadly early,
#     refine tightly late. Cosine anneal 0.3 → 0.05 over 50k of 80k online
#     steps (62.5% of training).
progressive_beta:
  start: 0.3
  end: 0.05
  warmup_steps: 0
  decay_steps: 50000

agent:
  hidden_dim: 256
  diffusion_blocks: 3
  diffusion_steps: 10
  edit_layers: 3
  edit_dropout: 0.0
  beta: 0.3                     # initial β; will be overridden by scheduler
                                # Important: starts HIGH so scheduler has range
  ensemble_size: 10
  num_min_q: 2
  n_otf_samples: 8
  gamma: 0.99
  tau: 0.005
  lr: 0.0003
  edit_grad_clip: 1.0
  delayed_edit_steps: 5000
