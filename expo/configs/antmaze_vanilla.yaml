# Vanilla EXPO (paper algorithm, no improvements). Resumes from the shared
# pretrain checkpoint. Online-only. Sized for ~6 hours wall clock running
# in PARALLEL with the improved kernel (each kernel gets ~half GPU
# throughput, so ~4 env-steps/sec → 80k env steps in ~5.5 h).

seed: 42
device: auto
log_dir: runs/antmaze_vanilla
run_name: full

env:
  name: antmaze
  dataset_id: D4RL/antmaze/medium-diverse-v1

online_capacity: 1000000
min_online_for_update: 256
online_ratio: 0.5
max_episode_steps: 1000

pretrain_steps: 0               # skipped — resume loads pretrained weights
total_env_steps: 80000
batch_size: 256
utd: 5
log_every: 1000
eval_every: 10000               # 8 evals during run
eval_episodes: 15
eval_at_pretrain_end: false     # already done in shared pretrain
save_every_steps: 10000

# === NO IMPROVEMENTS (this is the baseline) ===
n_step: 1                       # vanilla 1-step TD
# progressive_beta: not set    # fixed β

agent:
  hidden_dim: 256
  diffusion_blocks: 3
  diffusion_steps: 10
  edit_layers: 3
  edit_dropout: 0.0
  beta: 0.05                    # paper online Antmaze setting
  ensemble_size: 10
  num_min_q: 2
  n_otf_samples: 8
  gamma: 0.99
  tau: 0.005
  lr: 0.0003
  edit_grad_clip: 1.0
  delayed_edit_steps: 5000
